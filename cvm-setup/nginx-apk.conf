# Nginx APK 下载站点配置
server {
    listen 80;
    server_name _;  # 匹配所有域名/IP

    # APK 下载目录
    location /apk/ {
        alias /var/www/apk/;
        autoindex on;                    # 开启目录浏览
        autoindex_exact_size off;        # 显示友好文件大小
        autoindex_localtime on;          # 显示本地时间

        # APK 文件 MIME 类型
        types {
            application/vnd.android.package-archive apk;
        }

        # 安全头
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;

        # 允许跨域（如需从其他站点引用）
        # add_header Access-Control-Allow-Origin *;

        # 设置缓存
        expires 1h;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # 默认禁止访问其他路径
    location / {
        return 403;
    }

    # 日志
    access_log /var/log/nginx/apk_access.log;
    error_log /var/log/nginx/apk_error.log;
}
