version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-android
    restart: unless-stopped
    user: root  # 需要 root 权限以便安装 Android SDK
    ports:
      - "8080:8080"    # Jenkins Web UI
      - "50000:50000"  # Jenkins Agent 通信端口
    volumes:
      # Jenkins 主目录持久化
      - jenkins_home:/var/jenkins_home
      # Android SDK 目录挂载
      - /opt/android-sdk:/opt/android-sdk
      # APK 输出目录（与 Nginx 共享）
      - /var/www/apk:/var/www/apk
      # Docker socket 挂载（可选，如需在 Pipeline 中使用 Docker）
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # JVM 参数 - 根据 CVM 配置调整
      - JAVA_OPTS=-Xms1024m -Xmx4096m -Djenkins.install.runSetupWizard=false
      # Android 相关环境变量
      - ANDROID_HOME=/opt/android-sdk
      - ANDROID_SDK_ROOT=/opt/android-sdk
      # 将 Android SDK 工具加入 PATH
      - PATH=/opt/android-sdk/cmdline-tools/latest/bin:/opt/android-sdk/platform-tools:$${PATH}
      # 时区设置
      - TZ=Asia/Shanghai
    networks:
      - jenkins-net

networks:
  jenkins-net:
    driver: bridge

volumes:
  jenkins_home:
    driver: local
